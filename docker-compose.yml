services:

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    ports:
      - "9090:8080" # Spark Web UI
      - "7077:7077" # Master connection port
    command: [
      "/opt/spark/bin/spark-class", 
      "org.apache.spark.deploy.master.Master",
      "--host", "spark-master"
    ]

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "9091:8081" # Worker Web UI
    command: [
      "/opt/spark/bin/spark-class", 
      "org.apache.spark.deploy.worker.Worker", 
      "spark://spark-master:7077",
      "--cores", "2",
      "--memory", "2G"
    ]
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-one
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "8081:8081"
      - "9644:9644"

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"