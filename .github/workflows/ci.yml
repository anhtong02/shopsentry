name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added Week 3 DE tools: pyspark, feast, pandas, pyarrow, and pinned GX
        pip install ruff mypy pytest pydantic confluent-kafka email-validator pyyaml types-PyYAML scipy redis pyspark feast pandas pyarrow great_expectations==0.18.19

    - name: Lint with ruff
      run: ruff check .

    - name: Type check with mypy
      # If PySpark causes this step to fail, change this to: mypy simulator tests --install-types --non-interactive
      run: mypy simulator pipeline tests --install-types --non-interactive

    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        # Keep this restricted to unit tests so it doesn't look for missing Parquet databases
        python -m pytest tests/unit/ -v