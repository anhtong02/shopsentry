name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We add 'email-validator' because Pydantic needs it for UserSignup logic
        pip install ruff mypy pytest pydantic confluent-kafka email-validator

    - name: Lint with ruff
      run: ruff check .

    - name: Type check with mypy
      run: mypy simulator pipeline tests

    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        # This now runs test_event_schema.py, test_agents.py, and test_features.py
        python -m pytest tests/unit/ -v